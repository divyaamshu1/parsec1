<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parsec IDE</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        /* Critical inline styles for initial render */
        body { margin: 0; padding: 0; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif; }
        .loading { display: flex; justify-content: center; align-items: center; height: 100vh; background: #1e1e1e; color: #007acc; font-size: 24px; }
    </style>
</head>
<body>
    <div id="app" class="app">
        <div class="loading" id="loading">Loading Parsec IDE...</div>
    </div>

    <!-- Preload critical modules -->
    <script type="module">
        import { initializeApp } from './dist/main.js';
        
        // Hide loading and initialize app
        window.addEventListener('load', () => {
            const loading = document.getElementById('loading');
            if (loading) loading.style.display = 'none';
            initializeApp();
        });
    </script>
</body>
</html>
