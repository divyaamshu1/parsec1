<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Parsec IDE (Light)</title>
  <style>
    body { font-family: system-ui, sans-serif; margin:0; height:100vh; display:flex; flex-direction:column; }
    header { background:#111; color:#fff; padding:10px 16px; }
    main { flex:1; display:flex; }
    #sidebar { width:220px; background:#f3f3f3; padding:8px; box-sizing:border-box; }
    #editor { flex:1; padding:8px; box-sizing:border-box; }
    textarea { width:100%; height:100%; resize:none; font-family: monospace; font-size:13px; }
    button { display:block; margin:8px 0; width:100%; }
    #output { height:160px; background:#111; color:#0f0; padding:8px; overflow:auto; font-family:monospace; font-size:12px; }
  </style>
</head>
<body>
  <header>
    Parsec IDE — lightweight browser frontend
  </header>
  <main>
    <div id="sidebar">
      <button id="git-status">Git: status</button>
      <button id="run-cmd">Run: echo hello</button>
      <button id="reload">Reload</button>
      <hr/>
      <div><strong>Quick Commands</strong></div>
      <div style="font-size:12px;color:#444">Use the buttons to run commands on the host.</div>
    </div>
    <div id="editor">
      <textarea id="code">// Start editing here\nconsole.log('Hello Parsec');</textarea>
      <div id="output"></div>
    </div>
  </main>
  <script src="/main.js"></script>
</body>
</html>
